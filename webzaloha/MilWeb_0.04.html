<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knihovna příběhů</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: radial-gradient(circle at center, #111 0%, #000 100%);
    font-family: 'Cinzel', serif;
    color: #e0e0e0;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* kouř */
.smoke {
    position: fixed;
    top: 0;
    left: 0;
    width: 200%;
    height: 200%;
    pointer-events: none;
    z-index: 0;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.12), transparent 60%),
                radial-gradient(circle at 70% 70%, rgba(255,255,255,0.10), transparent 60%);
}

/* obsah */
.library, h1, .content, .footer {
    position: relative;
    z-index: 1;
}

.counter {
    position: fixed;
    top: 15px;
    right: 25px;
    color: #aaa;
}

h1 {
    margin: 30px;
    letter-spacing: 4px;
    color: #bbb;
}

.library {
    display: flex;
    gap: 6px;
    padding: 20px;
    border-bottom: 4px solid #222;
}

.book {
    width: 50px;
    height: 320px;
    background: linear-gradient(180deg, #111, #000);
    border-left: 2px solid #444;
    border-right: 1px solid #222;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    color: #bbb;
}

.wrap {
    height: 100%;
    display: flex;
    flex-direction: column;
}

.top, .bottom {
    display: flex;
    justify-content: center;
}

.middle {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
}

.spine {
    writing-mode: vertical-rl;
    font-size: 14px;
}

.vr {
    width: 1px;
    height: 120px;
    background: linear-gradient(to bottom, transparent, #ccc, transparent);
}

.content {
    display: none;
    max-width: 700px;
    padding: 20px;
}

.active {
    display: block;
}

.back {
    margin-top: 20px;
    cursor: pointer;
}

.footer {
    position: fixed;
    bottom: 10px;
    right: 20px;
    font-size: 12px;
    color: #777;
}
.footer {
    position: fixed;
    bottom: 10px;
    right: 20px;
    font-size: 12px;
    color: #777;
}

/* 🔥 TLAČÍTKA */
button {
    background: #111;
    color: #ccc;
    border: 1px solid #555;
    padding: 6px 12px;
    cursor: pointer;
    font-family: 'Cinzel', serif;
}

button:hover {
    color: white;
    border-color: #aaa;
}
</style>

</head>

<body>

<div class="smoke"></div>
<div class="counter" id="counter">👁 načítám...</div>

<h1>Knihovna příběhů</h1>

<div class="library" id="library"></div>
<div class="content" id="content"></div>

<div class="footer">Crafted by Wrox & ChatGPT</div>

<script>
    
const library = document.getElementById('library');
const content = document.getElementById('content');
let currentLang = "cz";
let currentChapter = 1;


// 📚 vytvoření knih
for (let i = 1; i <= 11; i++) {
    const book = document.createElement('div');
    book.className = 'book';
    book.innerText = i;

    book.onclick = () => openBook(i);
    library.appendChild(book);
}

// 📖 otevření knihy
function openBook(i) {
    library.style.display = 'none';
    content.classList.add('active');

    if (i === 1) {
    content.innerHTML = `
        <h2>Kniha 1</h2>
        <h3>Název knihy (Test Mory 1)</h3>

        <div style="display:flex; gap:10px; justify-content:center; margin:20px 0; flex-wrap:wrap;">
            <button onclick="showSection('cz')">🇨🇿 Příběh CZ</button>
            <button onclick="showSection('en')">🇬🇧 Story EN</button>
            <button onclick="showSection('gallery')">🖼 Galerie</button>
            <button onclick="showSection('characters')">👤 Postavy</button>
        </div>

        <div id="sectionContent">
            <p style="text-align:center;">👆 Vyber si část knihy</p>
        </div>

        <div class="back" onclick="goBack()">← zpět do knihovny</div>
    `;
}   
}

// 🔁 sekce knihy
function showSection(section) {

    const container = document.getElementById("sectionContent");
    if (!container) return;

    if (section === "cz") {
        currentLang = "cz";
        container.innerHTML = `<div id="chapterContent"></div>`;
        const savedChapter = localStorage.getItem("lastChapter_cz") || 1;
openChapter(1, parseInt(savedChapter), "cz");
    }

    else if (section === "en") {
        currentLang = "en";
        container.innerHTML = `<div id="chapterContent"></div>`;
        const savedChapter = localStorage.getItem("lastChapter_en") || 1;
openChapter(1, parseInt(savedChapter), "en");
    }

    else if (section === "gallery") {

        const images = [
    "obalka.jpg",
    "goku.jpg",
    "magie.jpg"
];

        let currentIndex = 0;

        let html = `<h3>Galerie scén</h3>

        <div style="display:flex; flex-wrap:wrap; gap:15px; justify-content:center;">`;

        images.forEach((img, index) => {
            html += `<img src="knihy/kniha1/scenes/${img}" 
                          class="gallery-img" 
                          data-index="${index}" 
                          style="width:200px; cursor:pointer;">`;
        });

        html += `</div>

        <div id="lightbox" 
             style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
             background:rgba(0,0,0,0.9); justify-content:center; align-items:center; flex-direction:column;">

            <div style="position:absolute; top:20px; right:30px; font-size:30px; cursor:pointer;" onclick="closeLightbox()">✖</div>

            <img id="lightbox-img" style="max-width:90%; max-height:80%;">

            <div style="margin-top:20px;">
                <button onclick="prevImage()">⟵</button>
                <button onclick="nextImage()">⟶</button>
            </div>
        </div>`;

        container.innerHTML = html;

        document.querySelectorAll(".gallery-img").forEach(img => {
            img.onclick = () => {
                currentIndex = parseInt(img.dataset.index);
                openLightbox();
            };
        });

        window.openLightbox = function() {
            document.getElementById("lightbox").style.display = "flex";
            document.getElementById("lightbox-img").src = `knihy/kniha1/scenes/${images[currentIndex]}`;
        };

        window.closeLightbox = function() {
            document.getElementById("lightbox").style.display = "none";
        };

        window.nextImage = function() {
            currentIndex = (currentIndex + 1) % images.length;
            openLightbox();
        };

        window.prevImage = function() {
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            openLightbox();
        };
    }

    else if (section === "characters") {

        const characters = [
    {
        name: "Hrdina",
        img: "hrdina.jpg",
        cz: "Hlavní postava příběhu.",
        en: "Main character of the story."
    },
    {
        name: "Záporák",
        img: "zapornak.jpg",
        cz: "Nepřítel, který všechno komplikuje.",
        en: "The enemy who complicates everything."
    }
];

        let html = `<h3>Postavy</h3>

        <div style="display:flex; flex-wrap:wrap; gap:20px; justify-content:center;">`;

        characters.forEach(char => {
            html += `
                <div style="border:1px solid #555; padding:15px; width:200px; text-align:center;">
                    <img src="knihy/kniha1/images/${char.img}" style="width:100%; margin-bottom:10px;">
                    <h4>${char.name}</h4>
                    <p><b>CZ:</b> ${char.cz}</p>
                    <p><b>EN:</b> ${char.en}</p>
                </div>
            `;
        });

        html += `</div>`;

        container.innerHTML = html;
    }
}

// 📄 načítání kapitol
function openChapter(book, chapter, lang) {
    currentChapter = chapter;

    localStorage.setItem("lastChapter_" + lang, chapter);
    localStorage.setItem("lastLang", lang);

    const maxChapters = { 1: 600 };

    if (chapter < 1) chapter = 1;

    if (chapter > maxChapters[book]) {
        document.getElementById("chapterContent").innerHTML = `
    <div style="margin-bottom:15px;">
        <button onclick="toggleChapters()">📚 Seznam kapitol</button>
    </div>

    <div id="chapterList" style="display:none; max-height:200px; overflow:auto; border:1px solid #555; padding:10px; margin-bottom:15px;"></div>

    <h3>${lang === 'cz' ? 'Kapitola' : 'Chapter'} ${String(chapter).padStart(2,'0')}</h3>

    <div id="pageText" style="white-space: pre-line; max-width:650px; margin:auto; line-height:1.8;"></div>

    <div id="pageInfo" style="margin-top:10px;"></div>

    <div style="margin-top:20px; display:flex; justify-content:center; gap:10px;">
        <button onclick="prevPage()">⟵</button>
        <button onclick="nextPage()">⟶</button>
    </div>
`;
    }

    const path = `knihy/kniha${book}/${lang}/kap${String(chapter).padStart(2,'0')}.txt`;

    fetch(path)
        .then(res => {
            if (!res.ok) throw new Error();
            return res.text();
        })
        .then(text => {

            let pages = [];
            let size = 800;

            for (let i = 0; i < text.length; i += size) {
                pages.push(text.substring(i, i + size));
            }

            let page = localStorage.getItem("page_" + lang + "_" + chapter) || 0;
            page = parseInt(page);

            function renderPage() {
                const el = document.getElementById("pageText");

el.style.opacity = 0;

setTimeout(() => {
    el.innerText = pages[page];
    el.style.opacity = 1;
}, 150);
                document.getElementById("pageInfo").innerText =
                    "Stránka " + (page + 1) + " / " + pages.length;

                localStorage.setItem("page_" + lang + "_" + chapter, page);
            }

            document.getElementById("chapterContent").innerHTML = `
    <div style="margin-bottom:15px;">
        <button onclick="toggleChapters()">📚 Seznam kapitol</button>
    </div>

    <div id="chapterList" style="display:none; max-height:200px; overflow:auto; border:1px solid #555; padding:10px; margin-bottom:15px;"></div>

    <h3>${lang === 'cz' ? 'Kapitola' : 'Chapter'} ${String(chapter).padStart(2,'0')}</h3>

    <div id="pageText" style="white-space: pre-line; max-width:650px; margin:auto; line-height:1.8;"></div>

    <div id="pageInfo" style="margin-top:10px;"></div>

    <div style="margin-top:20px; display:flex; justify-content:center; gap:10px;">
        <button onclick="prevPage()">⟵</button>
        <button onclick="nextPage()">⟶</button>
    </div>
`;

            window.nextPage = function() {
    if (page < pages.length - 1) {
        page++;
        renderPage();
    } else {
        // 👉 konec kapitoly → další kapitola
        openChapter(book, chapter + 1, lang);
    }
};

            window.prevPage = function() {
                if (page > 0) {
                    page--;
                    renderPage();
                }
            };

            renderPage();
        })
        .catch(() => {
            document.getElementById("chapterContent").innerHTML = `
    <div style="margin-bottom:15px;">
        <button onclick="toggleChapters()">📚 Seznam kapitol</button>
    </div>

    <div id="chapterList" style="display:none; max-height:200px; overflow:auto; border:1px solid #555; padding:10px; margin-bottom:15px;"></div>

    <h3>${lang === 'cz' ? 'Kapitola' : 'Chapter'} ${String(chapter).padStart(2,'0')}</h3>

    <div id="pageText" style="white-space: pre-line; max-width:650px; margin:auto; line-height:1.8;"></div>

    <div id="pageInfo" style="margin-top:10px;"></div>

    <div style="margin-top:20px; display:flex; justify-content:center; gap:10px;">
        <button onclick="prevPage()">⟵</button>
        <button onclick="nextPage()">⟶</button>
    </div>
`;
        });
}
function goToChapter(chapter) {
    openChapter(1, chapter, currentLang);
}
function generateChapters() {
    const list = document.getElementById("chapterList");

    let html = "";

    for (let i = 1; i <= 20; i++) {

        let style = "margin:3px;";

        if (i === currentChapter) {
            style += " background:#888; color:#000;";
        }

        html += `<button style="${style}" onclick="goToChapter(${i})">${i}</button>`;
    }

    list.innerHTML = html;
}
function toggleChapters() {
    const list = document.getElementById("chapterList");

    if (list.style.display === "none") {
        list.style.display = "block";
        generateChapters(); // 👈 TOHLE JE KLÍČ
    } else {
        list.style.display = "none";
    }
}

// 🔙 zpět
function goBack() {
    content.classList.remove('active');
    library.style.display = 'flex';
}
</script>

</body>
</html>
