<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knihovna příběhů</title>

<style>
body {
    margin: 0;
    background: #080808;
    font-family: Georgia, serif;
    color: #e0e0e0;
    display: flex;
    flex-direction: column;
    align-items: center;
}

h1 {
    margin: 25px;
    font-weight: normal;
    letter-spacing: 3px;
    color: #ccc;
}

/* knihovna */
.library {
    display: flex;
    gap: 6px;
    padding: 20px;
}

/* knihy */
.book {
    width: 50px;
    height: 320px;

    background:
        url("https://www.transparenttextures.com/patterns/black-linen.png"),
        linear-gradient(180deg, #111, #000);

    border-left: 2px solid #444;
    border-right: 1px solid #222;

    box-shadow:
        inset 0 0 10px rgba(255,255,255,0.05),
        inset 0 0 25px rgba(0,0,0,0.9);

    display: flex;
    align-items: center;
    justify-content: center;

    writing-mode: vertical-rl;
    text-orientation: mixed;

    cursor: pointer;
    transition: all 0.4s ease;
    position: relative;

    font-size: 14px;
    letter-spacing: 2px;
    color: #bbb;
    
    box-shadow:
    inset 0 0 8px rgba(255,255,255,0.08),
    inset 0 0 25px rgba(0,0,0,0.9),
    0 0 5px rgba(200,200,200,0.1);
}

/* horní ornament */
.book::before {
    content: "✦";
    position: absolute;
    top: 10px;
    font-size: 12px;
    color: #d0d0d0;
    text-shadow: 0 0 4px rgba(255,255,255,0.4);
}

/* dolní ornament */
.book::after {
    content: "✦";
    position: absolute;
    bottom: 10px;
    font-size: 12px;
    color: #d0d0d0;
    text-shadow: 0 0 4px rgba(255,255,255,0.4);
}

/* středová linka */
.book span {
    position: absolute;
    top: 40px;
    bottom: 40px;
    width: 1px;
    background: linear-gradient(
        to bottom,
        transparent,
        #ccc,
        transparent
    );
    opacity: 0.6;
}
/* variace knih */
.book:nth-child(odd) {
    width: 55px;
}

.book:nth-child(even) {
    width: 45px;
}

.book:nth-child(2n) {
    background:
        url("https://www.transparenttextures.com/patterns/asfalt-light.png"),
        linear-gradient(180deg, #1a1a1a, #000);
}

.book:nth-child(3n) {
    background:
        url("https://www.transparenttextures.com/patterns/black-paper.png"),
        linear-gradient(180deg, #141414, #000);
}

/* hover */
.book:hover {
    transform: translateY(-15px) scale(1.08);
    box-shadow:
        0 10px 25px rgba(0,0,0,0.9),
        0 0 15px rgba(200,200,200,0.25);
    color: #fff;
}

/* obsah */
.content {
    display: none;
    max-width: 700px;
    padding: 25px;
    line-height: 1.6;
}

.active {
    display: block;
}

.back {
    margin-top: 30px;
    cursor: pointer;
    color: #aaa;
}

.back:hover {
    color: #fff;
}
</style>
</head>

<body>

<h1>Knihovna příběhů</h1>

<div class="library" id="library"></div>

<div class="content" id="content"></div>

<script>
const library = document.getElementById('library');
const content = document.getElementById('content');

for (let i = 1; i <= 10; i++) {
    const book = document.createElement('div');
    book.className = 'book';

    if (i === 10) {
        book.innerHTML = "♥<br>Pro tebe";
    } else {
        book.innerText = i;
    }

    const line = document.createElement("span");
    book.appendChild(line);

    book.onclick = () => openBook(i);
    library.appendChild(book);
}

function openBook(i) {
    library.style.display = 'none';
    content.classList.add('active');

    if (i === 10) {
        content.innerHTML = `
            <h2>Pro tebe</h2>
            <p><i>Tento příběh je pro tebe...</i></p>

            <p>
            Moje krásná drahá ženo, toto je pro tebe jako základ tvého psaní. Moc a Moc te miluju ❤️
            </p>

            <hr>

            <p>
            Sem napiš něco o své ženě...
            </p>

            <div class="back" onclick="goBack()">← zpět do knihovny</div>
        `;
    } else {
        content.innerHTML = `
            <h2>Příběh ${i}</h2>
            <p>
            Sem vložíš její příběh...
            </p>

            <div class="back" onclick="goBack()">← zpět do knihovny</div>
        `;
    }
}

function goBack() {
    content.classList.remove('active');
    library.style.display = 'flex';
}
</script>

</body>
</html>
