<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knihovna příběhů</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: radial-gradient(circle at center, #111 0%, #000 100%);
    font-family: 'Cinzel', serif;
    color: #e0e0e0;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* 🌫️ KOUŘ */
.smoke {
    position: fixed;
    top: 0;
    left: 0;
    width: 200%;
    height: 200%;
    pointer-events: none;
    z-index: 0;

    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.12), transparent 60%),
                radial-gradient(circle at 70% 70%, rgba(255,255,255,0.10), transparent 60%),
                radial-gradient(circle at 50% 50%, rgba(255,255,255,0.08), transparent 70%);

    animation: smokeMove 60s linear infinite;
}

@keyframes smokeMove {
    0% { transform: translate(0,0); }
    50% { transform: translate(-10%, -10%); }
    100% { transform: translate(0,0); }
}

/* obsah nad kouřem */
.library,
h1,
.content,
.footer {
    position: relative;
    z-index: 1;
}

/* 👁 počítadlo */
.counter {
    position: fixed;
    top: 15px;
    right: 25px;
    color: #aaa;
    font-size: 14px;
    z-index: 10;
}

/* titulek */
h1 {
    margin: 30px;
    letter-spacing: 4px;
    color: #bbb;
}

/* knihovna */
.library {
    display: flex;
    gap: 6px;
    padding: 20px;
    border-bottom: 4px solid #222;
}

/* kniha */
.book {
    width: 50px;
    height: 320px;
    background: linear-gradient(180deg, #111, #000);
    border-left: 2px solid #444;
    border-right: 1px solid #222;

    display: flex;
    justify-content: center;
    align-items: center;

    cursor: pointer;
    color: #bbb;
}

/* layout knihy */
.wrap {
    height: 100%;
    display: flex;
    flex-direction: column;
}

.top, .bottom {
    display: flex;
    justify-content: center;
}

.middle {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* text */
.spine {
    writing-mode: vertical-rl;
    font-size: 14px;
}

/* ornament */
.vr {
    width: 1px;
    height: 120px;
    background: linear-gradient(to bottom, transparent, #ccc, transparent);
    opacity: 0.6;
}

/* obsah */
.content {
    display: none;
    max-width: 700px;
    padding: 20px;
}

.active {
    display: block;
}

.back {
    margin-top: 20px;
    cursor: pointer;
}

/* podpis */
.footer {
    position: fixed;
    bottom: 10px;
    right: 20px;
    font-size: 12px;
    color: #777;
}
</style>
</head>

<body>

<div class="smoke"></div>

<div class="counter">👁 000137</div>

<h1>Knihovna příběhů</h1>

<div class="library" id="library"></div>
<div class="content" id="content"></div>

<div class="footer">Crafted by Wrox & ChatGPT</div>

<script>
const library = document.getElementById('library');
const content = document.getElementById('content');

for (let i = 1; i <= 11; i++) {
    const book = document.createElement('div');
    book.className = 'book';

    let text = i;
    let height = 120;

    if (i === 10) {
        text = "♥ Něco málo o mně";
        height = 80;
    }

    if (i === 11) {
        text = "✝ Vzkazy";
        height = 60;
    }

    book.innerHTML = `
        <div class="wrap">
            <div class="top">
                <div class="vr" style="height:${height}px"></div>
            </div>

            <div class="middle">
                <div class="spine">${text}</div>
            </div>

            <div class="bottom">
                <div class="vr" style="height:${height}px"></div>
            </div>
        </div>
    `;

    book.onclick = () => openBook(i);
    library.appendChild(book);
}

function openBook(i) {
    library.style.display = 'none';
    content.classList.add('active');

    content.innerHTML = `
        <h2>Kniha ${i}</h2>
        <p>Obsah...</p>
        <div class="back" onclick="goBack()">← zpět</div>
    `;
}

function goBack() {
    content.classList.remove('active');
    library.style.display = 'flex';
}
</script>

</body>
</html>
