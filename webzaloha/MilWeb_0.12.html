<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knihovna příběhů</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: radial-gradient(circle at center, #111 0%, #000 100%);
    font-family: 'Cinzel', serif;
    color: #e0e0e0;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* kouř */
.smoke {
    position: fixed;
    top: 0;
    left: 0;
    width: 200%;
    height: 200%;
    pointer-events: none;
    z-index: 0;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.12), transparent 60%),
                radial-gradient(circle at 70% 70%, rgba(255,255,255,0.10), transparent 60%);
}

/* obsah */
.library, h1, .content, .footer {
    position: relative;
    z-index: 1;
}

.counter {
    position: fixed;
    top: 15px;
    right: 25px;
    color: #aaa;
}

h1 {
    margin: 30px;
    letter-spacing: 4px;
    color: #bbb;
}

.library {
    display: flex;
    gap: 6px;
    padding: 20px;
    border-bottom: 4px solid #222;
}

.book {
    width: 50px;
    height: 320px;
    background: linear-gradient(180deg, #111, #000);
    border-left: 2px solid #444;
    border-right: 1px solid #222;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    color: #bbb;
}

.wrap {
    height: 100%;
    display: flex;
    flex-direction: column;
}

.top, .bottom {
    text-align: center;
    font-size: 12px;
}

.middle {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
}

.spine {
    writing-mode: vertical-rl;
    transform: rotate(0deg);
    font-size: 14px;
    text-align: center;
}

.vr {
    width: 1px;
    height: 120px;
    background: linear-gradient(to bottom, transparent, #ccc, transparent);
}

.content {
    display: none;
    max-width: 700px;
    padding: 20px;
}

.active {
    display: block;
}

.back {
    margin-top: 20px;
    cursor: pointer;
}

.footer {
    position: fixed;
    bottom: 10px;
    right: 20px;
    font-size: 12px;
    color: #777;
}
.footer {
    position: fixed;
    bottom: 10px;
    right: 20px;
    font-size: 12px;
    color: #777;
}

/* 🔥 TLAČÍTKA */
button {
    background: #111;
    color: #ccc;
    border: 1px solid #555;
    padding: 6px 12px;
    cursor: pointer;
    font-family: 'Cinzel', serif;
}

button:hover {
    color: white;
    border-color: #aaa;
}
#pageText {
    transition: opacity 0.2s ease;
    min-height: 400px;
    text-align: justify;
    line-height: 1.6;
    text-indent: 2em;
    text-transform: none;
    font-family: Georgia, serif;
}
#sectionContent {
    transition: opacity 0.3s ease;
}   
</style>

</head>

// 📄 načítání kapitol
function openChapter(book, chapter, lang, forcedPage = null) {
    currentChapter = chapter;

    localStorage.setItem("lastChapter_" + lang, chapter);
    localStorage.setItem("lastLang", lang);

    if (chapter < 1) chapter = 1;

    const path = `knihy/kniha${book}/${lang}/kap${String(chapter).padStart(2,'0')}.txt`;

    fetch(path)
        .then(res => {
            if (!res.ok) throw new Error("404");
            return res.text();
        })
        .then(text => {

            // 🔥 název kapitoly
            let firstLine = text.split(/\r?\n/).find(line => line.trim() !== "") || "Bez názvu";
            window.chapterTitleText = firstLine;

            // 🔥 text bez názvu
            let cleanText = text.split(/\r?\n/).slice(1).join("\n");

            // 🔥 REALNÉ STRÁNKOVÁNÍ (Kindle styl)

let pages = [];
const box = document.getElementById("measureBox");
const contentBox = document.getElementById("pageText");

box.style.width = contentBox.clientWidth + "px";

const maxHeight = contentBox.clientHeight || 400;

box.innerText = "";

// 🔥 rozdělení na věty
let sentences = cleanText.match(/[^.!?]+[.!?]+|[^.!?]+$/g) || [];

let current = "";

sentences.forEach(sentence => {
    let test = current + sentence + " ";

    box.innerText = test;

    if (box.scrollHeight > maxHeight) {
        pages.push(current);
        current = sentence + " ";
    } else {
        current = test;
    }
});

// poslední stránka
if (current.trim() !== "") {
    pages.push(current);
}

            // 🔥 stránka
            if (forcedPage === "last") {
                page = pages.length - 1;
            } else if (forcedPage !== null) {
                page = forcedPage;
            } else {
                let saved = localStorage.getItem("page_" + lang + "_" + chapter);
                page = saved !== null ? parseInt(saved) : 0;
            }

            if (page < 0) page = 0;
            if (page >= pages.length) page = pages.length - 1;

            // 🔥 render
            window.renderPage = function () {

                const chapterTitle = document.getElementById("chapterTitle");
                if (chapterTitle) {
                    chapterTitle.innerText = window.chapterTitleText || "Bez názvu";
                }

                const el = document.getElementById("pageText");
                if (!el) return;

                el.style.opacity = 0;

                setTimeout(() => {
                    el.innerText = pages[page] || "⚠ prázdná stránka";
                    el.style.opacity = 1;
                }, 100);

                const info = document.getElementById("pageInfo");
                if (info) {
                    info.innerText =
                        (lang === 'cz' ? 'Stránka ' : 'Page ') +
                        (page + 1) + " / " + pages.length;
                }

                localStorage.setItem("page_" + lang + "_" + chapter, page);
            };

            // 🔥 navigace
            window.prevPage = function () {
                if (chapter === 1 && page === 0) return;

                if (page > 0) {
                    page--;
                    renderPage();
                } else {
                    openChapter(book, chapter - 1, lang, "last");
                }
            };

            window.nextPage = function () {
                if (page < pages.length - 1) {
                    page++;
                    renderPage();
                    return;
                }

                openChapter(book, chapter + 1, lang, 0);
            };

            renderPage();
        })
        .catch((err) => {
            console.error("ERROR DETAIL:", err);

            const el = document.getElementById("pageText");
            if (el) el.innerText = "❌ Chyba načítání";
        });
}
function goToChapter(chapter) {
    openChapter(1, chapter, currentLang);
}
async function getAvailableChapters(book, lang, max = 50) {
    let available = [];

    for (let i = 1; i <= max; i++) {
        const path = `knihy/kniha${book}/${lang}/kap${String(i).padStart(2,'0')}.txt`;

        try {
            const res = await fetch(path, { method: "HEAD" });
            if (res.ok) {
                available.push(i);
            } else {
                break; // jakmile nenajde → konec
            }
        } catch {
            break;
        }
    }

    return available;
}
async function generateChapters() {
    const list = document.getElementById("chapterList");

    const chapters = await getAvailableChapters(1, currentLang);

    let html = "";

    chapters.forEach(i => {
        let style = "margin:3px;";

        if (i === currentChapter) {
            style += " background:#888; color:#000;";
        }

        html += `<button style="${style}" onclick="goToChapter(${i})">${i}</button>`;
    });

    list.innerHTML = html;
}
async function toggleChapters() {
    const list = document.getElementById("chapterList");

    if (list.style.display === "none") {
        list.style.display = "block";
        await generateChapters();
    } else {
        list.style.display = "none";
    }
}
function openCharacter(index) {

    const char = characters[index];

    const container = document.getElementById("sectionContent");

    container.innerHTML = `
    <div style="
        max-width:800px; 
        margin:auto; 
        text-align:center;
        font-family: Georgia, serif;
        line-height:1.6;
    ">

            <button onclick="showSection('characters')" style="margin-bottom:20px;">
                ← zpět na postavy
            </button>

            <h2>${char.name}</h2>
            <div style="opacity:0.7; margin-bottom:20px;">${char.role}</div>

            <img src="knihy/kniha1/images/${char.img}" 
                style="
                    width:100%; 
                    max-height:500px; 
                    object-fit:contain; 
                    margin-bottom:20px;
                    background:black;
                    border:1px solid #444;
                    padding:5px;
                ">
            <div style="text-align:justify;">
                <p><b>CZ:</b> ${char.cz}</p>
                <p><b>EN:</b> ${char.en || "—"}</p>
            </div>

        </div>
        
    `;
};

// 🔙 zpět
function goBack() {
    localStorage.setItem("inBook", "false");
    content.classList.remove('active');
    library.style.display = 'flex';
}
window.onload = function() {
    const lastLang = localStorage.getItem("lastLang");
    const lastSection = localStorage.getItem("lastSection");
    const inBook = localStorage.getItem("inBook");
    const lastBook = localStorage.getItem("lastBook") || 1;

    if (inBook === "true") {
        openBook(parseInt(lastBook));

        setTimeout(() => {
            showSection(lastSection || lastLang);
        }, 100);
    }
};
document.addEventListener("keydown", function(e) {

    console.log("KEY:", e.key); // 👈 test

    if (e.key === "ArrowRight") {
        if (window.nextPage) {
            window.nextPage();
        }
    }

    if (e.key === "ArrowLeft") {
        if (window.prevPage) {
            window.prevPage();
        }
    }
});
let resizeTimeout;

window.addEventListener("resize", () => {
    clearTimeout(resizeTimeout);

    resizeTimeout = setTimeout(() => {
        openChapter(1, currentChapter, currentLang, page);
    }, 300);
});
