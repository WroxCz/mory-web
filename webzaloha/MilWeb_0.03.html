<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knihovna příběhů</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: radial-gradient(circle at center, #111 0%, #000 100%);
    font-family: 'Cinzel', serif;
    color: #e0e0e0;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* kouř */
.smoke {
    position: fixed;
    top: 0;
    left: 0;
    width: 200%;
    height: 200%;
    pointer-events: none;
    z-index: 0;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.12), transparent 60%),
                radial-gradient(circle at 70% 70%, rgba(255,255,255,0.10), transparent 60%);
}

/* obsah */
.library, h1, .content, .footer {
    position: relative;
    z-index: 1;
}

.counter {
    position: fixed;
    top: 15px;
    right: 25px;
    color: #aaa;
}

h1 {
    margin: 30px;
    letter-spacing: 4px;
    color: #bbb;
}

.library {
    display: flex;
    gap: 6px;
    padding: 20px;
    border-bottom: 4px solid #222;
}

.book {
    width: 50px;
    height: 320px;
    background: linear-gradient(180deg, #111, #000);
    border-left: 2px solid #444;
    border-right: 1px solid #222;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    color: #bbb;
}

.wrap {
    height: 100%;
    display: flex;
    flex-direction: column;
}

.top, .bottom {
    display: flex;
    justify-content: center;
}

.middle {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
}

.spine {
    writing-mode: vertical-rl;
    font-size: 14px;
}

.vr {
    width: 1px;
    height: 120px;
    background: linear-gradient(to bottom, transparent, #ccc, transparent);
}

.content {
    display: none;
    max-width: 700px;
    padding: 20px;
}

.active {
    display: block;
}

.back {
    margin-top: 20px;
    cursor: pointer;
}

.footer {
    position: fixed;
    bottom: 10px;
    right: 20px;
    font-size: 12px;
    color: #777;
}
.footer {
    position: fixed;
    bottom: 10px;
    right: 20px;
    font-size: 12px;
    color: #777;
}

/* 🔥 TLAČÍTKA */
button {
    background: #111;
    color: #ccc;
    border: 1px solid #555;
    padding: 6px 12px;
    cursor: pointer;
    font-family: 'Cinzel', serif;
}

button:hover {
    color: white;
    border-color: #aaa;
}
</style>

</head>

<body>

<div class="smoke"></div>
<div class="counter" id="counter">👁 načítám...</div>

<h1>Knihovna příběhů</h1>

<div class="library" id="library"></div>
<div class="content" id="content"></div>

<div class="footer">Crafted by Wrox & ChatGPT</div>

<script>
const library = document.getElementById('library');
const content = document.getElementById('content');

fetch("https://api.counterapi.dev/v1/wrox/knihovna/up")
    .then(res => res.json())
    .then(data => {
        document.getElementById("counter").innerText =
            "👁 " + String(data.count).padStart(6, "0");
    });

for (let i = 1; i <= 11; i++) {
    const book = document.createElement('div');
    book.className = 'book';

    let text = i;
    let height = 120;

    if (i === 10) {
        text = "♥ Něco málo o mně";
        height = 80;
    }

    if (i === 11) {
        text = "✝ Vzkazy";
        height = 60;
    }

    book.innerHTML = `
        <div class="wrap">
            <div class="top">
                <div class="vr" style="height:${height}px"></div>
            </div>
            <div class="middle">
                <div class="spine">${text}</div>
            </div>
            <div class="bottom">
                <div class="vr" style="height:${height}px"></div>
            </div>
        </div>
    `;

    book.onclick = () => {
    localStorage.setItem("posledniKniha", i);
    openBook(i);
};
    library.appendChild(book);
}

function openBook(i) {
    library.style.display = 'none';
    content.classList.add('active');

    if (i === 1) {
    content.innerHTML = `
        <h2>Kniha 1</h2>
        <h3>Název knihy (Test Mory 1)</h3>

        <div style="display:flex; gap:10px; justify-content:center; margin:20px 0; flex-wrap:wrap;">

            <button onclick="showSection('cz')">🇨🇿 Příběh CZ</button>
            <button onclick="showSection('gallery')">🖼 Galerie</button>
            <button onclick="showSection('characters')">👤 Postavy</button>

        </div>

        <div id="sectionContent"></div>

        <div class="back" onclick="goBack()">← zpět do knihovny</div>
    `;
    showSection('cz');
}
}

    else if (i === 10) {
        content.innerHTML = `
            <h2>Něco málo o mně</h2>
            <!-- tvůj obsah -->
        `;
    }

    else {
        content.innerHTML = `
            <h2>Kniha ${i}</h2>
            <p>Obsah...</p>
            <div class="back" onclick="goBack()">← zpět</div>
        `;
    }
 function showSection(section) {

    const container = document.getElementById("sectionContent");

    // 🇨🇿 PŘÍBĚH
    if (section === "cz") {
        container.innerHTML = `<div id="chapterContent"></div>`;
        openChapter(1, 1);
    }

    // 🖼 GALERIE
    else if (section === "gallery") {
        container.innerHTML = `
            <h3>Galerie scén</h3>
            <div style="display:flex; flex-wrap:wrap; gap:15px; justify-content:center;">
                <img src="images/scene1.jpg" style="width:200px;">
                <img src="images/scene2.jpg" style="width:200px;">
            </div>
        `;
    }

    // 👤 POSTAVY
    else if (section === "characters") {
        container.innerHTML = `
            <h3>Postavy</h3>

            <div style="display:flex; flex-direction:column; gap:20px; max-width:600px; margin:auto;">

                <div>
                    <h4>Jméno postavy</h4>
                    <img src="images/char1.jpg" style="width:120px;">
                    <p><b>CZ:</b> Popis postavy...</p>
                    <p><b>EN:</b> Character description...</p>
                </div>

            </div>
        `;
    }   
}
function openChapter(book, chapter) {

    const maxChapters = {
        1: 600
    };

    // ochrana rozsahu
    if (chapter < 1) chapter = 1;

    if (chapter > maxChapters[book]) {
        document.getElementById("chapterContent").innerHTML =
            `
            <p>📕 Konec knihy</p>
            <div style="margin-top:20px;">
                <button onclick="goBack()">← zpět do knihovny</button>
            </div>
            `;
        return;
    }

    // uložení pozice
    localStorage.setItem("posledniKniha", book);
    localStorage.setItem("posledniKapitola", chapter);

    const path = `knihy/kniha${book}/kap${String(chapter).padStart(2,'0')}.txt`;

    fetch(path)
        .then(res => {
            if (!res.ok) throw new Error("nenalezeno");
            return res.text();
        })
        .then(text => {
            document.getElementById("chapterContent").innerHTML =
                `
                <h3>Kapitola ${String(chapter).padStart(2,'0')}</h3>

                <div style="white-space: pre-line; max-width:650px; margin:auto; line-height:1.8;">
                    ${text}
                </div>

                <div style="margin-top:20px; display:flex; justify-content:center; gap:10px;">
                    <button onclick="openChapter(${book}, ${chapter - 1})">⟵ Předchozí</button>
                    <button onclick="goBack()">↑ Zpět</button>
                    <button onclick="openChapter(${book}, ${chapter + 1})">Další ⟶</button>
                </div>
                `;
        })
.catch(() => {
    document.getElementById("chapterContent").innerHTML =
        `
        <p>📕 Další kapitola zatím neexistuje</p>

        <div style="margin-top:20px; display:flex; justify-content:center; gap:10px;">
            <button onclick="openChapter(${book}, ${chapter - 1})">⟵ Zpět na předchozí kapitolu</button>
            <button onclick="goBack()">↑ Knihovna</button>
        </div>
        `;
});
}
function goBack() {
    content.classList.remove('active');
    library.style.display = 'flex';
}

// 🔥 načtení poslední knihy (musí být mimo funkce!)
setTimeout(() => {
    let kniha = localStorage.getItem("posledniKniha");
    let kapitola = localStorage.getItem("posledniKapitola");

    if (kniha) {
        openBook(parseInt(kniha));

        if (kapitola) {
            setTimeout(() => {
                openChapter(parseInt(kniha), parseInt(kapitola));
            }, 100);
        }
    }
}, 100);
</script>

</body>
</html>
