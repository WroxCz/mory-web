<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knihovna příběhů</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel&display=swap" rel="stylesheet">

    <style>
        .guard {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 320px;
            pointer-events: none;
            z-index: 0;
            opacity: 0.75;

            display: none;
            /* ← důležité */
        }

        * {
            box-sizing: border-box;
        }


        body.contact-active .guard {
            display: block;
        }

        /* LEVÝ – od středu */
        .guard.left {
            left: 50%;
            transform: translate(-300px, -50%);
        }

        /* PRAVÝ – od středu */
        .guard.right {
            left: 50%;
            transform: translate(0px, -50%);
        }

        body {
            margin: 0;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            font-family: 'Cinzel', serif;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;

            overflow-y: scroll;
        }


        /* kouř */
        .smoke {
            position: fixed;
            top: 0;
            left: 0;
            width: 200%;
            height: 200%;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.12), transparent 60%),
                radial-gradient(circle at 70% 70%, rgba(255, 255, 255, 0.10), transparent 60%);
        }


        @keyframes glowPulse {
            0% {
                box-shadow:
                    0 0 20px rgba(255, 140, 0, 0.2),
                    0 0 50px rgba(255, 80, 0, 0.1);
            }

            50% {
                box-shadow:
                    0 0 35px rgba(255, 160, 0, 0.35),
                    0 0 80px rgba(255, 100, 0, 0.25);
            }

            100% {
                box-shadow:
                    0 0 20px rgba(255, 140, 0, 0.2),
                    0 0 50px rgba(255, 80, 0, 0.1);
            }
        }

        /* obsah */
        .library,
        h1,
        .content,
        .footer {
            position: relative;
            z-index: 1;
        }

        .counter {
            position: fixed;
            top: 15px;
            right: 25px;
            color: #aaa;
        }

        .langSwitch {
            position: fixed;
            top: 40px;
            right: 25px;
            font-size: 18px;
            cursor: pointer;
        }

        .langSwitch span {
            margin-left: 5px;
            opacity: 0.7;
            transition: 0.2s;
        }

        .langSwitch span:hover {
            opacity: 1;
            transform: scale(1.2);
        }

        .langSwitch span.active {
            color: white;
            font-weight: bold;
        }

        .langSwitch img {
            width: 25px;
            cursor: pointer;
            margin-left: 5px;
            opacity: 0.7;
        }

        .langSwitch img:hover {
            opacity: 1;
            transform: scale(1.2);
        }

        h1 {
            margin: 30px;
            letter-spacing: 4px;
            color: #bbb;
        }

        .library {
            display: flex;
            gap: 6px;
            padding: 20px;
            border-bottom: 4px solid #222;
        }

        .book {
            transition: 0.3s;
            width: 50px;
            height: 320px;
            background: linear-gradient(180deg, #111, #000);
            border-left: 2px solid #444;
            border-right: 1px solid #222;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: #bbb;
        }

        .book:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .langSwitch span.active {
            color: white;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .wrap {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .top,
        .bottom {
            text-align: center;
            font-size: 12px;
        }

        .middle {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .spine {
            writing-mode: vertical-rl;
            transform: rotate(0deg);
            font-size: 14px;
            text-align: center;
        }

        .vr {
            width: 1px;
            height: 120px;
            background: linear-gradient(to bottom, transparent, #ccc, transparent);
        }

        .content {
            transition: opacity 0.3s ease;
            display: none;
            max-width: 700px;
            padding: 20px;
        }

        .active {
            display: block;
        }

        .back {
            margin-top: 20px;
            cursor: pointer;
        }

        .footer {
            position: fixed;
            bottom: 10px;
            right: 20px;
            font-size: 12px;
            color: #777;
        }

        /* 🔥 TLAČÍTKA */
        button {
            transition: 0.3s;
            background: #111;
            color: #ccc;
            border: 1px solid #555;
            padding: 6px 12px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            color: white;
            border-color: #aaa;
        }

        #pageText {
            transition: opacity 0.2s ease;
            min-height: 400px;
            text-align: justify;
            line-height: 1.6;
            text-indent: 2em;
            text-transform: none;
            font-family: Georgia, serif;
        }

        #sectionContent {
            transition: opacity 0.2s ease;
        }

        #messages div:hover {
            box-shadow: 0 0 25px rgba(0, 255, 150, 0.2);
            transform: scale(1.01);
            transition: 0.3s;
        }

        .textBlock {
            font-family: Georgia, serif;
            font-size: 15px;
            line-height: 1.7;
            text-align: justify;
            color: #ddd;
        }

        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            transition: 0.3s;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
        }

        .lightbox.show {
            display: flex;
            opacity: 1;
        }

        .darkFlash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0, 0, 0, 0.95) 0%, black 100%);
            z-index: 9999;
            opacity: 0;
            animation: darkPulse 0.6s ease;
        }

        @keyframes darkPulse {
            0% {
                opacity: 0;
            }

            40% {
                opacity: 1;
            }

            100% {
                opacity: 0;
            }

        }

        @keyframes bookPulse {
            0% {
                box-shadow: 0 0 20px rgba(255, 200, 100, 0.25),
                    0 0 40px rgba(255, 150, 50, 0.2);
            }

            40%,
            60% {
                box-shadow: 0 0 65px rgba(255, 200, 100, 0.75),
                    0 0 130px rgba(255, 150, 50, 0.55);
            }

            100% {
                box-shadow: 0 0 20px rgba(255, 200, 100, 0.25),
                    0 0 40px rgba(255, 150, 50, 0.2);
            }
        }

        .lightFlash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255, 220, 150, 0.25) 0%, rgba(0, 0, 0, 0.9) 70%);
            z-index: 9999;
            opacity: 0;
            animation: lightPulse 0.8s ease;
        }

        @keyframes lightPulse {
            0% {
                opacity: 0;
            }

            40% {
                opacity: 1;
            }

            100% {
                opacity: 0;
            }
        }

        .fade-in {
            opacity: 0;
            animation: fadeIn 2s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .activeSong {
            background: #222 !important;
            color: #fff !important;
            border-color: #aaa !important;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
            animation: pulseGlow 2s infinite;
        }

        @keyframes pulseGlow {
            0% {
                box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            }

            50% {
                box-shadow: 0 0 25px rgba(255, 255, 255, 0.6);
            }

            100% {
                box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            }
        }
    </style>

</head>

        // 📄 načítání kapitol
        function openChapter(book, chapter, lang, forcedPage = null) {
            updateLayout(false);
            currentChapter = chapter;

            localStorage.setItem("lastChapter_" + lang, chapter);
            localStorage.setItem("lastLang", lang);

            if (chapter < 1) chapter = 1;

            const path = `knihy/kniha${book}/${lang}/kap${String(chapter).padStart(2, '0')}.txt`;

            fetch(path)
                .then(res => {
                    if (!res.ok) throw new Error("404");
                    return res.text();
                })
                .then(text => {

                    // 🔥 název kapitoly
                    let firstLine = text.split(/\r?\n/).find(line => line.trim() !== "") || "Bez názvu";
                    window.chapterTitleText = firstLine;

                    // 🔥 text bez názvu
                    let cleanText = text.split(/\r?\n/).slice(1).join("\n");

                    // 🔥 REALNÉ STRÁNKOVÁNÍ (Kindle styl)

                    let pages = [];
                    const box = document.getElementById("measureBox");
                    const contentBox = document.getElementById("pageText");

                    if (!box || !contentBox) {
                        setTimeout(() => {
                            openChapter(book, chapter, lang, forcedPage);
                        }, 50);
                        return;
                    }

                    box.style.width = contentBox.clientWidth + "px";

                    const maxHeight = contentBox.clientHeight || 400;

                    box.innerText = "";

                    // 🔥 rozdělení na věty
                    let sentences = cleanText.match(/[^.!?]+[.!?]+|[^.!?]+$/g) || [];

                    let current = "";

                    sentences.forEach(sentence => {
                        let test = current + sentence + " ";

                        box.innerText = test;

                        if (box.scrollHeight > maxHeight) {
                            pages.push(current);
                            current = sentence + " ";
                        } else {
                            current = test;
                        }
                    });

                    // poslední stránka
                    if (current.trim() !== "") {
                        pages.push(current);
                    }

                    // 🔥 stránka
                    if (forcedPage === "last") {
                        page = pages.length - 1;
                    } else if (forcedPage !== null) {
                        page = forcedPage;
                    } else {
                        let saved = localStorage.getItem("page_" + lang + "_" + chapter);
                        page = saved !== null ? parseInt(saved) : 0;
                    }

                    if (page < 0) page = 0;
                    if (page >= pages.length) page = pages.length - 1;

                    // 🔥 render
                    window.renderPage = function () {

                        const chapterTitle = document.getElementById("chapterTitle");
                        if (chapterTitle) {
                            chapterTitle.innerText = window.chapterTitleText || "Bez názvu";
                        }

                        const el = document.getElementById("pageText");
                        if (!el) return;

                        el.style.opacity = 0;

                        setTimeout(() => {
                            el.innerText = pages[page] || t("emptyPage");
                            el.style.opacity = 1;
                        }, 100);

                        const info = document.getElementById("pageInfo");
                        if (info) {
                            info.innerText =
                                (page + 1) + " / " + pages.length;
                        }

                        localStorage.setItem("page_" + lang + "_" + chapter, page);
                    };

                    // 🔥 navigace
                    window.prevPage = function () {
                        if (page > 0) {
                            page--;
                            renderPage();
                            return;
                        }
                        // 🔥 jsme na začátku stránky → zkus předchozí kapitolu
                        getAvailableChapters(book, lang).then(chapters => {

                            if (chapters.includes(chapter - 1)) {
                                openChapter(book, chapter - 1, lang, "last");
                            } else {
                                console.log("📖 Začátek knihy");
                            }
                        });
                    };

                    window.nextPage = function () {
                        if (page < pages.length - 1) {
                            page++;
                            renderPage();
                            return;
                        }

                        getAvailableChapters(book, lang).then(chapters => {
                            if (chapters.includes(chapter + 1)) {
                                openChapter(book, chapter + 1, lang, 0);
                            } else {
                                console.log("📖 Konec knihy");
                            }
                        });
                    };

                    renderPage();
                    generateChapters();

                })
                .catch((err) => {
                    console.error("ERROR DETAIL:", err);

                    // 🔥 fallback na kapitolu 1
                    if (chapter !== 1) {
                        openChapter(book, 1, lang);
                        return;
                    }

                    const el = document.getElementById("pageText");
                    if (el) el.innerText = "❌ Chyba načítání";
                });
        }
        function goToChapter(chapter) {
            openChapter(1, chapter, currentLang);

        async function getAvailableChapters(book, lang, max = 50) {
            let available = [];

            for (let i = 1; i <= max; i++) {
                const path = `knihy/kniha${book}/${lang}/kap${String(i).padStart(2, '0')}.txt`;

                try {
                    const res = await fetch(path, { method: "HEAD" });
                    if (res.ok) {
                        available.push(i);
                    } else {
                        break; // jakmile nenajde → konec
                    }
                } catch {
                    break;
                }
            }

            return available;
        }

                ${t("back")}
            </div>

        </div>
    </div>
</div>
`;

                content.innerHTML = html;
                const img = document.querySelector(".music-bg");
                const card = document.querySelector(".music-card");

                if (img && card) {
                    img.onload = () => {

                        const ratio = img.naturalWidth / img.naturalHeight;

                        if (ratio < 1) {
                            card.style.aspectRatio = "9 / 16";
                            img.style.objectFit = "cover";
                        } else {
                            card.style.aspectRatio = "16 / 9";
                            img.style.objectFit = "contain";
                        }
                    };
                }

                const audio = document.getElementById("audioPlayer");
                const progressBar = document.getElementById("progressBar");
                const progressContainer = document.getElementById("progressContainer");
                const timeInfo = document.getElementById("timeInfo");

                if (!audio) {
                    console.error("❌ audioPlayer nenalezen");
                    isRenderingMusic = false; // 🔥 ODEMKNI!
                    return;
                }

                // 🔥 EVENTY – jen jednou!
                audio.ontimeupdate = () => {
                    if (!audio.duration) return;

                    const percent = (audio.currentTime / audio.duration) * 100;
                    progressBar.style.width = percent + "%";

                    const format = (t) => {
                        const m = Math.floor(t / 60);
                        const s = Math.floor(t % 60).toString().padStart(2, "0");
                        return m + ":" + s;
                    };

                    timeInfo.innerText =
                        format(audio.currentTime) + " / " + format(audio.duration);
                };

                audio.onended = () => nextSong();

                progressContainer.onclick = (e) => {
                    const rect = progressContainer.getBoundingClientRect();
                    const percent = (e.clientX - rect.left) / rect.width;
                    audio.currentTime = percent * audio.duration;
                };
            } finally {
                isRenderingMusic = false;
            }
        }
        function playSong(index) {

            console.log("hraju", index);

            // aktivní tlačítko
            document.querySelectorAll('.song-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`songBtn${index}`)?.classList.add('active');

            if (!songs || !songs[index]) return;

            currentSongIndex = index;

            // reset stylů
            songs.forEach((_, i) => {
                const btn = document.getElementById(`songBtn${i}`);
                if (btn) btn.classList.remove("activeSong");
            });

            const activeBtn = document.getElementById(`songBtn${index}`);
            if (activeBtn) activeBtn.classList.add("activeSong");

            // 🔥 TADY JE TEN KLÍČ
            const audio = document.getElementById("audioPlayer");
            const title = document.getElementById("songTitle");

            // změna názvu (BEZ renderu)
            title.innerText = songs[index].title;

            // změna songu
            audio.src = songs[index].file;

            // přehrát
            audio.play();
        }
        function nextSong() {
            let next = currentSongIndex + 1;
            if (next >= songs.length) next = 0;
            playSong(next);
        }

        function prevSong() {
            let prev = currentSongIndex - 1;
            if (prev < 0) prev = songs.length - 1;
            playSong(prev);

            // ⏱ update
            audio.ontimeupdate = () => {
                const percent = (audio.currentTime / audio.duration) * 100;
                progressBar.style.width = percent + "%";

                const format = (t) => {
                    const m = Math.floor(t / 60);
                    const s = Math.floor(t % 60).toString().padStart(2, "0");
                    return `${m}:${s}`;
                };

                timeInfo.innerText = `${format(audio.currentTime)} / ${format(audio.duration)}`;
            };
        }

        function togglePlay() {
            const audio = document.getElementById("audioPlayer");
            if (!audio) return;

            if (audio.paused) {
                audio.play();
            } else {
                audio.pause();
            }
        }
    </script>
    <div id="measureBox" style="
    position:absolute;
    visibility:hidden;
    padding:20px;
    font-family:'Cinzel', serif;
    line-height:1.6;
    white-space: pre-wrap;
"></div>
