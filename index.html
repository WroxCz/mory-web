<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knihovna příběhů</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: radial-gradient(circle at center, #111 0%, #000 100%);
    font-family: 'Cinzel', serif;
    color: #e0e0e0;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* kouř */
.smoke {
    position: fixed;
    top: 0;
    left: 0;
    width: 200%;
    height: 200%;
    pointer-events: none;
    z-index: 0;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.12), transparent 60%),
                radial-gradient(circle at 70% 70%, rgba(255,255,255,0.10), transparent 60%);
}
@keyframes glowPulse {
    0% {
        box-shadow: 
            0 0 20px rgba(255,140,0,0.2),
            0 0 50px rgba(255,80,0,0.1);
    }
    50% {
        box-shadow: 
            0 0 35px rgba(255,160,0,0.35),
            0 0 80px rgba(255,100,0,0.25);
    }
    100% {
        box-shadow: 
            0 0 20px rgba(255,140,0,0.2),
            0 0 50px rgba(255,80,0,0.1);
    }
}

/* obsah */
.library, h1, .content, .footer {
    position: relative;
    z-index: 1;
}

.counter {
    position: fixed;
    top: 15px;
    right: 25px;
    color: #aaa;
}
.langSwitch {
    position: fixed;
    top: 40px;
    right: 25px;
    font-size: 18px;
    cursor: pointer;
}

.langSwitch span {
    margin-left: 5px;
    opacity: 0.7;
    transition: 0.2s;
}

.langSwitch span:hover {
    opacity: 1;
    transform: scale(1.2);
}
.langSwitch span.active {
    color: white;
    font-weight: bold;
}
.langSwitch img {
    width: 25px;
    cursor: pointer;
    margin-left: 5px;
    opacity: 0.7;
}

.langSwitch img:hover {
    opacity: 1;
    transform: scale(1.2);
}
h1 {
    margin: 30px;
    letter-spacing: 4px;
    color: #bbb;
}

.library {
    display: flex;
    gap: 6px;
    padding: 20px;
    border-bottom: 4px solid #222;
}

.book {
    transition: 0.3s;
    width: 50px;
    height: 320px;
    background: linear-gradient(180deg, #111, #000);
    border-left: 2px solid #444;
    border-right: 1px solid #222;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    color: #bbb;
}
.book:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(255,255,255,0.2);
}
.langSwitch span.active {
    color: white;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(255,255,255,0.5);
}

.wrap {
    height: 100%;
    display: flex;
    flex-direction: column;
}

.top, .bottom {
    text-align: center;
    font-size: 12px;
}

.middle {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
}

.spine {
    writing-mode: vertical-rl;
    transform: rotate(0deg);
    font-size: 14px;
    text-align: center;
}

.vr {
    width: 1px;
    height: 120px;
    background: linear-gradient(to bottom, transparent, #ccc, transparent);
}

.content {
    transition: opacity 0.3s ease;
    display: none;
    max-width: 700px;
    padding: 20px;
}

.active {
    display: block;
}

.back {
    margin-top: 20px;
    cursor: pointer;
}

.footer {
    position: fixed;
    bottom: 10px;
    right: 20px;
    font-size: 12px;
    color: #777;
}

/* 🔥 TLAČÍTKA */
button {
    transition: 0.3s;
    background: #111;
    color: #ccc;
    border: 1px solid #555;
    padding: 6px 12px;
    cursor: pointer;
    font-family: 'Cinzel', serif;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(255,255,255,0.2);
    color: white;
    border-color: #aaa;
}
#pageText {
    transition: opacity 0.2s ease;
    min-height: 400px;
    text-align: justify;
    line-height: 1.6;
    text-indent: 2em;
    text-transform: none;
    font-family: Georgia, serif;
}
#sectionContent {
    transition: opacity 0.2s ease;
} 
#messages div:hover {
    box-shadow: 0 0 25px rgba(0,255,150,0.2);
    transform: scale(1.01);
    transition: 0.3s;
}
.textBlock {
    font-family: Georgia, serif;
    font-size: 15px;
    line-height: 1.7;
    text-align: justify;
    color: #ddd;
} 

</style>

</head>

// 📖 otevření knihy
function openBook(i) {
    updateLayout(false);
    localStorage.setItem("lastBook", i);
    localStorage.setItem("inBook", "true");

    library.style.display = 'none';
    content.classList.add('active');

    if (i === 1) {
        content.innerHTML = `
            <h2>Kniha 1</h2>
            <h3>${books[i]?.[currentLang] || "Unknown"}</h3>

             <div id="bookMenu" style="display:flex; gap:10px; justify-content:center; margin:20px 0; flex-wrap:wrap;">
                <button data-section="story">📖 ${currentLang === "cz" ? "Příběh" : "Story"}</button>
                <button data-section="gallery">🖼 ${t("gallery")}</button>
                <button data-section="characters">👤 ${t("characters")}</button>
            </div>

            <div id="sectionContent">
    ${localStorage.getItem("lastSection") ? "" : `<p style="text-align:center;">${t("choosePart")}</p>`}
</div>            
        `;

        // 🔥 JEDINÝ LISTENER PRO VŠECHNY TLAČÍTKA
    document.getElementById("bookMenu").onclick = (e) => {
        const btn = e.target.closest("button");
        if (!btn) return;

        const section = btn.dataset.section;
        if (section) {
            showSection(section);
        }
    };
}
else {
        content.innerHTML = `
            <h2>Kniha ${i}</h2>
            <h3>${books[i]?.[currentLang] || "Unknown"}</h3>

            <p style="text-align:center; margin-top:30px; opacity:0.7;">
                ✨ Tato kniha se teprve připravuje...
            </p>

            <div class="back" onclick="goBack()">← zpět do knihovny</div>
        `;
    }
setTimeout(() => {
    if (localStorage.getItem("reload")) {

        setTimeout(() => {
            const section = localStorage.getItem("lastSection");

            if (section === "story") {
                showSection("story");

                const savedChapter = parseInt(localStorage.getItem("lastChapter_" + currentLang)) || 1;

                setTimeout(() => {
                    openChapter(1, savedChapter, currentLang);
                }, 100);

            } else if (["gallery", "characters"].includes(section)) {
                showSection(section);
            } else {
                showSection("story");
            }

            localStorage.removeItem("reload");
        }, 150);      
    }
}, 50);

const lastSection = localStorage.getItem("lastSection");

if (lastSection) {
    setTimeout(() => {
        showSection(lastSection);
    }, 50);
}

}

function showSection(section) {
    console.log("SECTION:", section); // debug

    if (!section) section = "story";

    const container = document.getElementById("sectionContent");
    if (!container) return;

    localStorage.setItem("lastSection", section);
    console.log("SECTION:", section);

    if (!["story", "gallery", "characters"].includes(section)) {
        section = "story";
    }
    if (section === "story") {

    container.innerHTML = `
        <div style="text-align:center; margin-bottom:10px;">
            <button onclick="toggleChapters()">📚 ${t("chapters")}</button>
        </div>

        <div id="chapterList" style="display:none; text-align:center;"></div>

        <div id="chapterContent">
            <div id="chapterTitle"></div>
            <div id="pageText"></div>

            <div style="margin-top:15px; text-align:center;">
                <button onclick="prevPage()">⬅</button>
                <span id="pageInfo"></span>
                <button onclick="nextPage()">➡</button>
            </div>
        </div>
        <div style="text-align:center; margin-top:20px; opacity:0.7; cursor:pointer;"
            onclick="goBack()">
             ${t("back")}
        </div>
    `;

    let saved = parseInt(localStorage.getItem("lastChapter_" + currentLang)) || 1;

// 🔥 pojistka – max kapitola (zatím máš 2)
if (saved > 3) saved = 1;

openChapter(1, saved, currentLang);
}

    // 🖼 GALERIE
    if (section === "gallery") {

    let html = `
    <h3>${t("gallery")}</h3>>

    <div id="galleryGrid" style="
        display:grid;
        grid-template-columns: repeat(3, 1fr);
        gap:15px;

function openChapter(book, chapter, lang, forcedPage = null) {
    updateLayout(false);
    currentChapter = chapter;

    localStorage.setItem("lastChapter_" + lang, chapter);
    localStorage.setItem("lastLang", lang);

    if (chapter < 1) chapter = 1;

    const path = `knihy/kniha${book}/${lang}/kap${String(chapter).padStart(2,'0')}.txt`;

    fetch(path)
        .then(res => {
            if (!res.ok) throw new Error("404");
            return res.text();
        })
        .then(text => {

            // 🔥 název kapitoly
            let firstLine = text.split(/\r?\n/).find(line => line.trim() !== "") || "Bez názvu";
            window.chapterTitleText = firstLine;

            // 🔥 text bez názvu
            let cleanText = text.split(/\r?\n/).slice(1).join("\n");

            // 🔥 REALNÉ STRÁNKOVÁNÍ (Kindle styl)

let pages = [];
const box = document.getElementById("measureBox");
const contentBox = document.getElementById("pageText");

if (!box || !contentBox) {
    setTimeout(() => {
        openChapter(book, chapter, lang, forcedPage);
    }, 50);
    return;
}

box.style.width = contentBox.clientWidth + "px";

const maxHeight = contentBox.clientHeight || 400;

box.innerText = "";

// 🔥 rozdělení na věty
let sentences = cleanText.match(/[^.!?]+[.!?]+|[^.!?]+$/g) || [];

let current = "";

sentences.forEach(sentence => {
    let test = current + sentence + " ";

    box.innerText = test;

    if (box.scrollHeight > maxHeight) {
        pages.push(current);
        current = sentence + " ";
    } else {
        current = test;
    }
});

// poslední stránka
if (current.trim() !== "") {
    pages.push(current);
}

            // 🔥 stránka
            if (forcedPage === "last") {
                page = pages.length - 1;
            } else if (forcedPage !== null) {
                page = forcedPage;
            } else {
                let saved = localStorage.getItem("page_" + lang + "_" + chapter);
                page = saved !== null ? parseInt(saved) : 0;
            }

            if (page < 0) page = 0;
            if (page >= pages.length) page = pages.length - 1;

            // 🔥 render
            window.renderPage = function () {

                const chapterTitle = document.getElementById("chapterTitle");
                if (chapterTitle) {
                    chapterTitle.innerText = window.chapterTitleText || "Bez názvu";
                }

                const el = document.getElementById("pageText");
                if (!el) return;

                el.style.opacity = 0;

                setTimeout(() => {
                    el.innerText = pages[page] || t("emptyPage");
                    el.style.opacity = 1;
                }, 100);

                const info = document.getElementById("pageInfo");
                if (info) {
                    info.innerText =
                    (page + 1) + " / " + pages.length;
                }

                localStorage.setItem("page_" + lang + "_" + chapter, page);
            };

            // 🔥 navigace
            window.prevPage = function () {
                if (page > 0) {
                    page--;
                    renderPage();
                    return;
                }
                // 🔥 jsme na začátku stránky → zkus předchozí kapitolu
                getAvailableChapters(book, lang).then(chapters => {

                    if (chapters.includes(chapter - 1)) {
                        openChapter(book, chapter - 1, lang, "last");
                    } else {
                        console.log("📖 Začátek knihy");
                    }             
                });
            };

            window.nextPage = function () {
                 if (page < pages.length - 1) {
                    page++;
                    renderPage();
                    return;
                }

                    getAvailableChapters(book, lang).then(chapters => {
                        if (chapters.includes(chapter + 1)) {
                            openChapter(book, chapter + 1, lang, 0);
                        } else {
                            console.log("📖 Konec knihy");
                        }
                    });
                };

                renderPage();
                generateChapters();
            
        })
        .catch((err) => {
    console.error("ERROR DETAIL:", err);

    // 🔥 fallback na kapitolu 1
    if (chapter !== 1) {
        openChapter(book, 1, lang);
        return;
    }

    const el = document.getElementById("pageText");
    if (el) el.innerText = "❌ Chyba načítání";
});
}
function goToChapter(chapter) {
    openChapter(1, chapter, currentLang);

async function getAvailableChapters(book, lang, max = 50) {
    let available = [];

    for (let i = 1; i <= max; i++) {
        const path = `knihy/kniha${book}/${lang}/kap${String(i).padStart(2,'0')}.txt`;

        try {
            const res = await fetch(path, { method: "HEAD" });
            if (res.ok) {
                available.push(i);
            } else {
                break; // jakmile nenajde → konec
            }
        } catch {
            break;
        }
    }

    return available;
}
async function generateChapters() {
    const list = document.getElementById("chapterList");

    const chapters = await getAvailableChapters(1, currentLang);

    let html = "";

    chapters.forEach(i => {
        let style = "margin:3px;";

        if (i === currentChapter) {
            style += " background:#888; color:#000;";
        }

        html += `<button style="${style}" onclick="goToChapter(${i})">${i}</button>`;
    });

    list.innerHTML = html;
}
async function toggleChapters() {
    const list = document.getElementById("chapterList");

    if (list.style.display === "none") {
        list.style.display = "block";
        await generateChapters();
    } else {
        list.style.display = "none";
    }
}

document.addEventListener("keydown", function(e) {

    console.log("KEY:", e.key);

    // 🖼 pokud je otevřený obrázek → ovládá galerii
    if (document.getElementById("imgViewer")) {

        if (e.key === "ArrowRight") nextImg();
        if (e.key === "ArrowLeft") prevImg();
        if (e.key === "Escape") closeImg();

        return; // ❗ zastaví další logiku
    }

    // 📖 jinak ovládá knihu
    if (e.key === "ArrowRight") {
        if (window.nextPage) {
            window.nextPage();
        }
    }

    if (e.key === "ArrowLeft") {
        if (window.prevPage) {
            window.prevPage();
        }
    }
});

function sanitize(text) {
    return text.replace(/</g, "&lt;").replace(/>/g, "&gt;");

async function addMessage(e) {
    e.preventDefault();

    const name = document.getElementById("msgName").value;
    const text = document.getElementById("msgText").value;

    await addDoc(collection(db, "messages"), {
        name: sanitize(name),
        text: sanitize(text),
        time: new Date().toLocaleString()
    });

    e.target.reset();
    loadMessages();
}
async function loadMessages() {
    const container = document.getElementById("messages");
    if (!container) return;

    const querySnapshot = await getDocs(collection(db, "messages"));

    let html = "";

    if (querySnapshot.empty) {
        container.innerHTML = `<p style="text-align:center; opacity:0.6;">
            ${t("emptyMessages")}
        </p>`;
        return;
    }

    querySnapshot.forEach((doc) => {
        const msg = doc.data();

        html += `
            <div style="border:1px solid #444; padding:20px; margin-bottom:20px;">
                <div>✍ ${msg.name}</div>
                <div style="font-size:11px; opacity:0.5;">${msg.time}</div>
                <p>${msg.text}</p>
            </div>
        `;
    });

    container.innerHTML = html;
}
